name: Build, Test & Security

on:
  push:
    branches: ["main"]
  pull_request: {}

jobs:
  build-test-security:
    runs-on: ubuntu-latest

    env:
      # Feature flags — flip to "true" when ready
      RUN_SONAR: "true"
      RUN_VERACODE: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build + Tests + Coverage (JaCoCo gate in pom.xml)
        run: mvn -B clean test jacoco:report

      # (2) Cache Dependency-Check DB
      - name: Cache Dependency-Check DB
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: depcheck-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            depcheck-${{ runner.os }}-

      # (3) Don't fail the whole pipeline if NVD update flakes
      - name: Dependency Vulnerability Scan (OWASP Dependency-Check)
        continue-on-error: true
        run: mvn -B org.owasp:dependency-check-maven:check

      - name: Sonar Scan
        if: ${{ env.RUN_SONAR == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.login="$SONAR_TOKEN" \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY"

      - name: Package artifact (jar)
        run: mvn -B -DskipTests package

      - name: Veracode Upload & Scan (disabled)
        if: ${{ env.RUN_VERACODE == 'true' }}
        run: echo "Veracode scan disabled"

      - name: Docker build
        run: docker build -t employee-api:${{ github.sha }} .
