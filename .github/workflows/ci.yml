name: Build, Test & Security

on:
  push:
    branches: ["main"]
  pull_request: {}

jobs:
  build-test-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build + Tests + Coverage (JaCoCo gate in pom.xml)
        run: mvn -B clean test jacoco:report

      - name: Dependency Vulnerability Scan (OWASP Dependency-Check)
        run: mvn -B org.owasp:dependency-check-maven:check

      - name: Sonar Scan (optional)
        if: ${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.login="$SONAR_TOKEN" \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY"

      - name: Package artifact (jar)
        run: mvn -B -DskipTests package

      - name: Veracode Upload & Scan (optional)
        if: ${{ secrets.VERACODE_API_ID }}
        uses: veracode/veracode-uploadandscan-action@0.2.7
        with:
          appname: ${{ secrets.VERACODE_APP_NAME }}
          createprofile: true
          filepath: target
          version: ${{ github.sha }}
        env:
          VERACODE_API_ID: ${{ secrets.VERACODE_API_ID }}
          VERACODE_API_KEY: ${{ secrets.VERACODE_API_KEY }}

      - name: Docker build
        run: docker build -t employee-api:${{ github.sha }} .